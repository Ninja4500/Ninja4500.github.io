<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول واتساب المطور</title>
    <style>
        /* كود التوسيط المطلق */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: grid;
            place-items: center; /* يضع العناصر في المنتصف تماماً طولاً وعرضاً */
            background-color: #f0f2f5; 
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 90%; 
            max-width: 400px;
            box-sizing: border-box;
        }

        h2 { color: #128C7E; margin-top: 0; }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 20px 0; 
            border: 2px dashed #25D366; 
            border-radius: 12px; 
            font-size: 18px; 
            text-align: center; 
            box-sizing: border-box;
            outline: none;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button { 
            border: none; 
            padding: 14px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            width: 100%; 
            transition: 0.3s;
        }

        .btn-main { background: #25D366; color: white; }
        .btn-main:hover { background: #128C7E; }

        .btn-secondary { background: #e7f9ee; color: #128C7E; }
        .btn-secondary:hover { background: #d1f2de; }

        p { color: #666; font-size: 14px; margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>واتساب مباشر</h2>
    <p>اسحب الرقم وأفلته هنا أو اكتبه</p>
    
    <input type="text" id="phoneInput" placeholder="5xxxxxxxx" ondrop="handleDrop(event)" oninput="formatNumber()">
    
    <div class="button-group">
        <button class="btn-main" onclick="cleanAndRedirect()">فتح في واتساب</button>
        <button class="btn-secondary" onclick="openWeb()">المتابعة عبر المتصفح</button>
    </div>
</div>

<script>
    function formatNumber() {
        let input = document.getElementById('phoneInput');
        let val = input.value.replace(/\D/g, ''); // تنظيف من الرموز
        
        if (val.startsWith('966')) val = val.substring(3);
        if (val.startsWith('05')) val = val.substring(1);
        
        input.value = val;
    }

    function handleDrop(event) {
        event.preventDefault();
        let data = event.dataTransfer.getData("text");
        document.getElementById('phoneInput').value = data;
        formatNumber();
    }

    function getCleanNumber() {
        let num = document.getElementById('phoneInput').value;
        if (num.length < 9) {
            alert("الرجاء إدخال رقم صحيح (9 أرقام بدون الصفر)");
            return null;
        }
        return "966" + num;
    }

    function cleanAndRedirect() {
        let fullNum = getCleanNumber();
        if (fullNum) window.location.href = "https://wa.me/" + fullNum;
    }

    function openWeb() {
        let fullNum = getCleanNumber();
        if (fullNum) window.open("https://web.whatsapp.com/send?phone=" + fullNum, "_blank");
    }
</script>

</body>
</html>
