<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واتساب مباشر</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        h2 {
            font-weight: 500;
            color: #111b21;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            border: 2px dashed #e1e9eb; /* جعل الحدود منقطة لتوحي بالسحب والإفلات */
            border-radius: 8px;
            font-size: 18px;
            box-sizing: border-box;
            text-align: center;
            direction: ltr;
            transition: 0.3s;
        }

        input:focus {
            border-color: #25D366;
            outline: none;
            background-color: #f9fffb;
        }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-secondary {
            display: block;
            width: 100%;
            padding: 13px;
            background-color: transparent;
            color: #111b21;
            text-decoration: none;
            border: 1px solid #e1e9eb;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-primary:hover { background-color: #1fb355; }
        
        .hint {
            font-size: 12px;
            color: #8696a0;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>دردشة واتساب سريعة</h2>
        
        <input type="tel" id="phoneNumber" 
               placeholder="اسحب الرقم هنا أو اكتبه"
               ondrop="handleDrop(event)" 
               ondragover="allowDrop(event)">

        <button class="btn-primary" onclick="processNumber('app')">فتح التطبيق مباشرة</button>
        <button class="btn-secondary" onclick="processNumber('web')">المتابعة عبر المتصفح</button>
        
        <p class="hint">اسحب رقم حراج (tel:+966...) وأفلته داخل المربع</p>
    </div>

    <script>
        // السماح بالإفلات داخل الخانة
        function allowDrop(ev) {
            ev.preventDefault();
        }

        // معالجة النص عند إفلاته
        function handleDrop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            document.getElementById('phoneNumber').value = data;
            processNumber('app'); // التشغيل تلقائياً بمجرد الإفلات
        }

        function cleanNumber(phone) {
            // 1. حذف tel: و علامة + وأي مسافات
            let clean = phone.replace(/tel:/g, '').replace(/\+/g, '').replace(/\s+/g, '');

            // 2. حذف كود الدولة السعودي 966 إذا وجد في البداية
            if (clean.startsWith('966')) {
                clean = clean.substring(3);
            }

            // 3. إذا كان يبدأ بـ 05، نحذف الصفر ليتبقى 5
            if (clean.startsWith('05')) {
                clean = clean.substring(1);
            }
            
            // تنظيف أي رموز أخرى متبقية غير الأرقام
            clean = clean.replace(/\D/g, '');

            return clean;
        }

        function processNumber(type) {
            var rawPhone = document.getElementById('phoneNumber').value;
            var finalPhone = cleanNumber(rawPhone);

            if (finalPhone === "" || finalPhone.length < 9) {
                alert("الرجاء إدخال رقم صحيح");
                return;
            }

            // وضع الرقم النظيف في الخانة للعرض
            document.getElementById('phoneNumber').value = finalPhone;

            var fullNumber = "966" + finalPhone;

            if (type === 'app') {
                window.location.href = "whatsapp://send?phone=" + fullNumber;
            } else {
                window.open("https://web.whatsapp.com/send?phone=" + fullNumber, "_blank");
            }
        }
    </script>

</body>
</html>
