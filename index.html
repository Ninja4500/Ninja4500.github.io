
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محول واتساب المطور</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px dashed #25D366; border-radius: 10px; font-size: 18px; text-align: center; box-sizing: border-box; }
        button { background: #25D366; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #128C7E; }
        p { color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>واتساب مباشر</h2>
    <p>اسحب الرقم وأفلته هنا</p>
    <input type="text" id="phoneInput" placeholder="أفلت الرقم هنا..." ondrop="handleDrop(event)" oninput="cleanAndRedirect()">
    <button onclick="cleanAndRedirect()">فتح في واتساب</button>
</div>

<script>
    function handleDrop(event) {
        // منع السلوك الافتراضي للمتصفح
        event.preventDefault();
        // الحصول على النص المسحوب
        let data = event.dataTransfer.getData("text");
        document.getElementById('phoneInput').value = data;
        // معالجة الرقم فور الإفلات
        cleanAndRedirect();
    }

    function cleanAndRedirect() {
        let input = document.getElementById('phoneInput');
        let rawData = input.value;

        // 1. حذف نصوص البداية tel: و + و أي مسافات
        let cleanNumber = rawData.replace(/tel:/g, '').replace(/\+/g, '').replace(/\s/g, '');

        // 2. حذف كود الدولة 966 إذا وجد في البداية
        if (cleanNumber.startsWith('966')) {
            cleanNumber = cleanNumber.substring(3);
        }

        // 3. التأكد من أن الرقم يبدأ بـ 5 (إذا كان يبدأ بـ 05 نحذف الصفر)
        if (cleanNumber.startsWith('05')) {
            cleanNumber = cleanNumber.substring(1);
        }

        // الآن الرقم أصبح بصيغة 5XXXXXXXX
        if (cleanNumber.length >= 9) {
            input.value = cleanNumber;
            // التوجيه للواتساب بصيغة 966 + الرقم المتبقي
            window.location.href = "https://wa.me/966" + cleanNumber;
        }
    }
</script>

</body>
</html>
        <button class="btn-primary" onclick="openApp()">فتح التطبيق مباشرة</button>
        
        <button class="btn-secondary" onclick="openWeb()">المتابعة عبر المتصفح</button>
    </div>

    <script>
        function openApp() {
            var code = document.getElementById('countryCode').value;
            var phone = document.getElementById('phoneNumber').value;
            phone = phone.replace(/\s+/g, '').replace('+', '');

            if (phone === "") {
                alert("الرجاء إدخال الرقم");
                return;
            }

            // هذا الرابط يحاول فتح التطبيق المثبت على الجهاز مباشرة
            window.location.href = "whatsapp://send?phone=" + code + phone;
        }

        function openWeb() {
            var code = document.getElementById('countryCode').value;
            var phone = document.getElementById('phoneNumber').value;
            if (phone !== "") {
                window.open("https://web.whatsapp.com/send?phone=" + code + phone, "_blank");
            }
        }
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>محول الواتساب الخاص بي</title>
    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const phone = params.get('tel');
            if (phone) {
                // تنظيف الرقم من أي رموز زائدة
                const cleanPhone = phone.replace(/\D/g, '');
                window.location.href = "https://wa.me/" + cleanPhone;
            }
        }
    </script>
</head>
