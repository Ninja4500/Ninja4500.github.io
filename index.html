<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول واتساب حراج</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #25d366; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="loader"></div>
        <h2>جاري التحويل إلى واتساب...</h2>
        <p id="status">يتم الآن قراءة الرقم من حراج</p>
    </div>

    <script>
        function redirectToWhatsApp() {
            // جلب الرقم من الرابط سواء كان tel: أو ?phone=
            const urlParams = new URLSearchParams(window.location.search);
            let rawNumber = urlParams.get('phone') || window.location.hash || window.location.pathname;
            
            // تنظيف الرقم من أي نصوص أو رموز (مثل tel: أو المسارات)
            let cleanNumber = rawNumber.replace(/\D/g, '');

            if (cleanNumber.length >= 9) {
                // إذا بدأ الرقم بـ 0 نغيره لـ 966
                if (cleanNumber.startsWith('05')) {
                    cleanNumber = '966' + cleanNumber.substring(1);
                }
                
                document.getElementById('status').innerText = "تم العثور على الرقم: " + cleanNumber;
                
                // التحويل التلقائي
                setTimeout(() => {
                    window.location.href = "https://wa.me/" + cleanNumber;
                }, 500);
            } else {
                document.getElementById('status').innerText = "الرجاء الضغط على رقم هاتف في حراج";
            }
        }

        window.onload = redirectToWhatsApp;
    </script>
</body>
</html>
