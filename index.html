<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واتساب مباشر</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff; /* خلفية بيضاء سادة كما في الصورة */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        h2 {
            font-weight: 500;
            color: #111b21;
            margin-bottom: 30px;
        }

        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #e1e9eb;
            border-radius: 8px;
            background: #f0f2f5;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid #e1e9eb;
            border-radius: 8px;
            font-size: 18px;
            box-sizing: border-box;
            text-align: center;
            direction: ltr;
        }

        /* زر أخضر يشبه الموجود في الصورة */
        .btn-primary {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 25px; /* حواف دائرية مثل الصورة */
            font-size: 16px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
        }

        /* زر أبيض بحدود للخيارات الأخرى */
        .btn-secondary {
            display: block;
            width: 100%;
            padding: 13px;
            background-color: transparent;
            color: #111b21;
            text-decoration: none;
            border: 1px solid #e1e9eb;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-primary:hover { background-color: #1fb355; }
    </style>
</head>
<body>

    <div class="container">
        <h2>دردشة واتساب سريعة</h2>
        
        <select id="countryCode">
            <option value="966" selected>السعودية (+966)</option>
            <option value="971">الإمارات (+971)</option>
            <option value="20">مصر (+20)</option>
        </select>

        <input type="tel" id="phoneNumber" placeholder="5XXXXXXXX">

        <button class="btn-primary" onclick="openApp()">فتح التطبيق مباشرة</button>
        
        <button class="btn-secondary" onclick="openWeb()">المتابعة عبر المتصفح</button>
    </div>

    <script>
        function openApp() {
            var code = document.getElementById('countryCode').value;
            var phone = document.getElementById('phoneNumber').value;
            phone = phone.replace(/\s+/g, '').replace('+', '');

            if (phone === "") {
                alert("الرجاء إدخال الرقم");
                return;
            }

            // هذا الرابط يحاول فتح التطبيق المثبت على الجهاز مباشرة
            window.location.href = "whatsapp://send?phone=" + code + phone;
        }

        function openWeb() {
            var code = document.getElementById('countryCode').value;
            var phone = document.getElementById('phoneNumber').value;
            if (phone !== "") {
                window.open("https://web.whatsapp.com/send?phone=" + code + phone, "_blank");
            }
        }
    </script>

</body>
</html>
